service: transaction-processor

provider:
  name: aws
  runtime: java21
  region: us-east-1
  stage: dev
  timeout: 30
  memorySize: 1024
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowCredentials: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
          Resource: !GetAtt TransactionQueue.Arn
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt TransactionTable.Arn
            - !GetAtt UserTable.Arn
            - !GetAtt MerchantTable.Arn

package:
  artifact: target/transaction-processor-lambda-lambda-zip.zip

functions:
  payment:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker
    environment:
      JAVA_TOOL_OPTIONS: -XX:+TieredCompilation -XX:TieredStopAtLevel=1
      SPRING_CLOUD_FUNCTION_DEFINITION: handlePayment
      MAIN_CLASS: api.reactive.webflux.Application
    events:
      - httpApi: 'POST /payment'

  getAccountBalance:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker
    environment:
      JAVA_TOOL_OPTIONS: -XX:+TieredCompilation -XX:TieredStopAtLevel=1
      SPRING_CLOUD_FUNCTION_DEFINITION: getAccountBalance
      MAIN_CLASS: api.reactive.webflux.Application
    events:
      - httpApi: 'GET /accounts/{id}'

resources:
  Resources:
    # Cola SQS
    TransactionQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: transaction-processor-queue-${self:provider.stage}

    # Tabla de Transacciones
    TransactionTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: transaction-processor-table-${self:provider.stage}
        AttributeDefinitions:
          - AttributeName: paymentId
            AttributeType: S
        KeySchema:
          - AttributeName: paymentId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # Tabla de Usuarios
    UserTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: user-accounts-${self:provider.stage}
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # Tabla de Comercios
    MerchantTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: merchant-accounts-${self:provider.stage}
        AttributeDefinitions:
          - AttributeName: merchantId
            AttributeType: S
        KeySchema:
          - AttributeName: merchantId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
